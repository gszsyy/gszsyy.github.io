<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460" role="img" aria-labelledby="title desc">
  <title id="title">AprilTag / DeepTag 位姿驱动 Unity 动态演示</title>
  <desc id="desc">展示相机取流、DeepTag 检测、多面体融合、PnP 位姿估计和 Unity 驱动的链路动画。</desc>
  <defs>
    <style>
      .bg{fill:#efe2c4}.panel{fill:#fffdf3;stroke:#c9a24a;stroke-width:3}.line{stroke:#0b6b57;stroke-width:6;fill:none;stroke-linecap:round}.thin{stroke:#6c5b37;stroke-width:3;fill:none}.title{font:800 27px sans-serif;fill:#193327}.text{font:700 21px sans-serif;fill:#193327}.small{font:500 16px sans-serif;fill:#5b4a2e}.tag{fill:#101820}.tag2{fill:#fff}.accent{fill:#c8587b}.green{fill:#0b6b57}.gold{fill:#c9a24a}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#0b6b57"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="460"/>
  <text x="58" y="54" class="title">阶段 1 位姿链路动态演示</text>
  <text x="58" y="84" class="small">360 度八等份可见面 · 每面贴 Tag · DeepTag 鲁棒检测 · 输出 6DoF 给 Unity</text>

  <g transform="translate(58,125)">
    <rect class="panel" x="0" y="0" width="185" height="168" rx="14"/>
    <text x="27" y="38" class="text">创维 1600</text>
    <rect x="51" y="60" width="82" height="58" rx="9" fill="#23262b"/>
    <circle cx="92" cy="89" r="17" fill="#5f6b78"/>
    <text x="32" y="140" class="small">30fps 灰度帧</text>
  </g>

  <g transform="translate(305,112)">
    <rect class="panel" x="0" y="0" width="226" height="194" rx="14"/>
    <text x="28" y="40" class="text">DeepTag 检测</text>
    <rect class="tag" x="50" y="66" width="48" height="48"/>
    <rect class="tag2" x="61" y="77" width="11" height="11"/><rect class="tag2" x="78" y="77" width="11" height="11"/><rect class="tag2" x="61" y="94" width="11" height="11"/>
    <rect class="tag" x="137" y="70" width="48" height="48" transform="rotate(12 161 94)"/>
    <path class="accent" d="M48 145c39-26 94-26 136 0" opacity=".72"/>
    <text x="31" y="174" class="small">低光 / 模糊 / 遮挡增强</text>
  </g>

  <g transform="translate(595,101)">
    <rect class="panel" x="0" y="0" width="248" height="216" rx="14"/>
    <text x="32" y="39" class="text">多面体融合</text>
    <polygon points="124,58 190,96 190,166 124,204 58,166 58,96" fill="#e9c86f" stroke="#6c5b37" stroke-width="3"/>
    <polygon points="124,58 190,96 124,134 58,96" fill="#f6dc8e" stroke="#6c5b37" stroke-width="2"/>
    <polygon points="58,96 124,134 124,204 58,166" fill="#d6a943" stroke="#6c5b37" stroke-width="2"/>
    <polygon points="190,96 124,134 124,204 190,166" fill="#f0c967" stroke="#6c5b37" stroke-width="2"/>
    <rect class="tag" x="104" y="92" width="38" height="38" transform="rotate(30 123 111)"/>
    <text x="35" y="181" class="small">多 Tag 刚体约束</text>
    <text x="35" y="202" class="small">PnP + 重投影精修</text>
  </g>

  <g transform="translate(910,125)">
    <rect class="panel" x="0" y="0" width="188" height="168" rx="14"/>
    <text x="65" y="38" class="text">Unity</text>
    <rect x="58" y="61" width="72" height="72" rx="12" fill="#0b6b57"/>
    <path d="M77 97h34M94 80v34" stroke="#fffdf3" stroke-width="8" stroke-linecap="round"/>
    <text x="38" y="150" class="small">虚拟物体驱动</text>
  </g>

  <path class="line" d="M250 210H292" marker-end="url(#arrow)"/>
  <path class="line" d="M538 210H582" marker-end="url(#arrow)"/>
  <path class="line" d="M850 210h46" marker-end="url(#arrow)"/>

  <circle class="accent" r="11">
    <animateMotion dur="5s" repeatCount="indefinite" path="M245 210H292H538H582H850H896"/>
  </circle>
  <g transform="translate(58,354)">
    <rect class="panel" x="0" y="0" width="1060" height="54" rx="12" opacity=".92"/>
    <text x="24" y="34" class="small">当前验证：创维 1600 已完成基础跟随；约束：30fps 灰度帧、分时复用取流、未接底层 IMU 同步。</text>
  </g>
</svg>
